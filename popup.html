<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>QuickPad</title>
  <link rel="stylesheet" href="popup.css" />
</head>
<body>
  <div class="container">
    <header class="header">
      <div class="title-row">
        <svg class="logo" viewBox="0 0 24 24" fill="none" xmlns="http://www.w3.org/2000/svg">
          <rect x="3" y="3" width="18" height="18" rx="3" fill="url(#grad)" />
          <line x1="7" y1="8" x2="17" y2="8" stroke="white" stroke-width="1.5" stroke-linecap="round"/>
          <line x1="7" y1="12" x2="17" y2="12" stroke="white" stroke-width="1.5" stroke-linecap="round"/>
          <line x1="7" y1="16" x2="13" y2="16" stroke="white" stroke-width="1.5" stroke-linecap="round"/>
          <defs>
            <linearGradient id="grad" x1="3" y1="3" x2="21" y2="21" gradientUnits="userSpaceOnUse">
              <stop offset="0%" stop-color="#7c3aed"/>
              <stop offset="100%" stop-color="#4f46e5"/>
            </linearGradient>
          </defs>
        </svg>
        <span class="app-name">QuickPad</span>
      </div>
      <div class="action-row">
        <span id="char-count" class="char-count">0 chars</span>
        <button id="copy-btn" class="btn btn-ghost" title="Copy all">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
            <rect x="9" y="9" width="13" height="13" rx="2" ry="2"/>
            <path d="M5 15H4a2 2 0 0 1-2-2V4a2 2 0 0 1 2-2h9a2 2 0 0 1 2 2v1"/>
          </svg>
          Copy
        </button>
        <button id="clear-btn" class="btn btn-ghost btn-danger" title="Clear all">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
            <polyline points="3 6 5 6 21 6"/>
            <path d="M19 6l-1 14a2 2 0 0 1-2 2H8a2 2 0 0 1-2-2L5 6"/>
            <path d="M10 11v6M14 11v6"/>
            <path d="M9 6V4h6v2"/>
          </svg>
          Clear
        </button>
      </div>
    </header>

    <textarea
      id="notepad"
      class="notepad"
      placeholder="Type or paste anything here…&#10;Your notes are saved automatically."
      spellcheck="true"
    ></textarea>

    <div id="toast" class="toast">✓ Copied to clipboard!</div>
  </div>

  <script src="popup.js"></script>
</body>
</html>
